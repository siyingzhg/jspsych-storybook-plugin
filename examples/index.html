<!DOCTYPE html>
<html>
  <head>
    <title>jsPsychStorybook Example</title>
    <script src="https://unpkg.com/jspsych"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response"></script>
    <!-- Once this plugin package is published, you can load it from a CDN instead:
<script src="https://unpkg.com/plugin-storybook"></script> -->
    <script src="../dist/index.browser.min.js"></script>
    <script src="../dist/extension-animations.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych/css/jspsych.css" />
    <!-- <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script> -->

  </head>

  <body></body>
  <script>
    const jsPsych = initJsPsych({
      extensions: [{ type: jsPsychExtensionAnimations }],
      on_finish: () => jsPsych.data.displayData(),
    });

    // Browsers block audio until the user interacts with the page, so start
    // with a button press. This also lets jsPsych preload the audio files.
    const start = {
      type: jsPsychHtmlButtonResponse,
      stimulus: "<h1>In Progress</h1><p>Click start, then listen.</p>",
      choices: ["Start"],
    };

    // The storybook trial plays each clip in the `audio` array at its
    // `time_onset` (ms). The trial ends after the last clip finishes.

    const readytogo = {
      type: jsPsychStorybook,
      background_image: "img/background.jpeg",
      images: [],
      width: 70, 
      highlight: [],
      animations: [], 
    
      // onsets = previous clip's exact end + 2000ms, so every gap is 2s
      // (exact durations in ms: ready 610, chimes 6015, arlo-hi 3251,
      //  sarah-hi 3571, mom-hi 3611, dad-hi 1891)
      audio: [
        { src: "sound/ready.mp3", time_onset: 0 },
      ],
    };

    const arlo = {
      type: jsPsychStorybook,
      background_image: "img/background.jpeg",
      images: [{ id: "arlo", src: "img/arlo.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 0, duration: 5000 },
               { id: "arlo-hi", src: "img/arlo-hi.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 5000 }],
      width: 70, 
      highlight: [],
      animations: [], 
    
      // onsets = previous clip's exact end + 2000ms, so every gap is 2s
      // (exact durations in ms: ready 610, chimes 6015, arlo-hi 3251,
      //  sarah-hi 3571, mom-hi 3611, dad-hi 1891)
      audio: [
        { src: "sound/chimes.mp3", time_onset: 0 },
        { src: "sound/arlo-hi.mp3", time_onset: 6015 },
      ],
    };

    const sarah = {
      type: jsPsychStorybook,
      background_image: "img/background.jpeg",
      images: [{ id: "sarah", src: "img/sarah.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 0, duration: 5000 },
               { id: "sarah-hi", src: "img/sarah-hi.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 5000 }],
      width: 70, 
      highlight: [],
      animations: [], 
    
      // onsets = previous clip's exact end + 2000ms, so every gap is 2s
      // (exact durations in ms: ready 610, chimes 6015, arlo-hi 3251,
      //  sarah-hi 3571, mom-hi 3611, dad-hi 1891)
      audio: [
        { src: "sound/chimes.mp3", time_onset: 0 },
        { src: "sound/sarah-hi.mp3", time_onset: 6015 },
      ],
    };

    const dad = {
      type: jsPsychStorybook,
      background_image: "img/background.jpeg",
      images: [{ id: "dad", src: "img/dad.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 0, duration: 5000 },
               { id: "dad-hi", src: "img/dad-hi.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 5000 }],
      width: 70, 
      highlight: [],
      animations: [], 
    
      // onsets = previous clip's exact end + 2000ms, so every gap is 2s
      // (exact durations in ms: ready 610, chimes 6015, arlo-hi 3251,
      //  sarah-hi 3571, mom-hi 3611, dad-hi 1891)
      audio: [
        { src: "sound/chimes.mp3", time_onset: 0 },
        { src: "sound/dad-hi.mp3", time_onset: 6015 },
      ],
    };

    const mom = {
      type: jsPsychStorybook,
      background_image: "img/background.jpeg",
      images: [{ id: "mom", src: "img/mom.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 0, duration: 5000 },
               { id: "mom-hi", src: "img/mom-hi.png", x_pos: 20, y_pos: 20, width: 60, time_onset: 5000 }],
      width: 70, 
      highlight: [],
      animations: [], 
    
      // onsets = previous clip's exact end + 2000ms, so every gap is 2s
      // (exact durations in ms: ready 610, chimes 6015, arlo-hi 3251,
      //  sarah-hi 3571, mom-hi 3611, dad-hi 1891)
      audio: [
        { src: "sound/chimes.mp3", time_onset: 0 },
        { src: "sound/mom-hi.mp3", time_onset: 6015 },
      ],
    };
    

    

    jsPsych.run([start, readytogo, arlo, sarah, mom, dad]);
  </script>
</html>
